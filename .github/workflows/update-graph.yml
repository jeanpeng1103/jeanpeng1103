name: Update commit garden

on:
  schedule:
    - cron: "0 8 * * *"   # daily at 8:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate cute contribution graph
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: jeanpeng1103
          OUTPUT: assets/contribution-graph.svg
        run: python scripts/generate_graph.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-graph.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update commit garden 🌱"
            git push
          fi
