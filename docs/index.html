    .card {

      box-shadow: 0 8px 24px rgba(232, 180, 212, 0.25);
      overflow: visible;
    }
    .header {
      position: absolute;
      left: 20px;
      top: 20px;
      color: #6b4c7a;

    .grid-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 1019px;
      height: 315px;
      pointer-events: none;
    }
    .month, .day-label {
      position: absolute;
      font-size: 10px;
      color: #c4a8d4;
      pointer-events: none;
    }
    .month { top: 90px; }
    .day-label { left: 20px; }
    .day-cell {
      position: absolute;
      width: 15px;
      height: 15px;
      border: none;
      border-radius: 4px;
      padding: 0;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 1px 2px rgba(232, 180, 212, 0.35);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      display: grid;
      place-items: center;
    }
    .day-cell:hover, .day-cell:focus-visible {
      transform: scale(1.15);
      z-index: 2;
      box-shadow: 0 0 0 2px #8fbc9a, 0 4px 10px rgba(31, 122, 76, 0.25);
      outline: none;
    }
    .cell-count {
      font-size: 8px;
      font-weight: 700;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.12s ease;
    }
    .day-cell:hover .cell-count, .day-cell:focus-visible .cell-count {
      opacity: 1;
    }
    .sparkle {
      position: absolute;
      top: 1px;
      font-size: 6px;
      color: #fff;
      pointer-events: none;
    }
    .legend {
      position: absolute;
      left: 48px;
      top: 239px;
      display: flex;
      align-items: center;
      gap: 4px;
      color: #b8a0c4;
      font-size: 10px;
      pointer-events: none;
    }
    .legend-swatch {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(232, 180, 212, 0.35);
    }
    .footer {
      position: absolute;
      right: 20px;
      bottom: 16px;
      color: #d4b8e0;
      font-size: 9px;
      pointer-events: none;
    }
    #tooltip {
      position: fixed;
      pointer-events: none;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(107, 76, 122, 0.94);
      color: #fff;
      font-size: 12px;
      line-height: 1.3;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 10px));
      transition: opacity 0.1s ease;
      white-space: nowrap;
      z-index: 20;
      box-shadow: 0 4px 14px rgba(107, 76, 122, 0.3);
    }
    #tooltip.visible { opacity: 1; }
    #tooltip strong { display: block; font-size: 11px; color: #ffd8ec; }
  </style>

  <script>
    const tip = document.getElementById("tooltip");
    const strong = tip.querySelector("strong");
    const span = tip.querySelector("span");

    function showTip(cell, x, y) {
      strong.textContent = cell.dataset.date;
      span.textContent = cell.dataset.count;
      tip.style.left = x + "px";
      tip.style.top = y + "px";
      tip.classList.add("visible");
    }

    function hideTip() {
      tip.classList.remove("visible");
    }

    document.querySelectorAll(".day-cell").forEach((cell) => {
      cell.addEventListener("mouseenter", (e) => showTip(cell, e.clientX, e.clientY));
      cell.addEventListener("mousemove", (e) => showTip(cell, e.clientX, e.clientY));
      cell.addEventListener("mouseleave", hideTip);
      cell.addEventListener("focus", () => {
        const rect = cell.getBoundingClientRect();
        showTip(cell, rect.left + rect.width / 2, rect.top);
      });
      cell.addEventListener("blur", hideTip);
    });
  </script>
